name: Update fuel prices from Eurostat

on:
  schedule:
    # Every Monday at 09:00 UTC (Oil Bulletin is published on Mondays)
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pandas openpyxl

      - name: Update fuel prices
        run: python .github/scripts/update_fuel_prices.py

      - name: Commit changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add script.js
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update fuel prices from Eurostat"
            git push
          fi
